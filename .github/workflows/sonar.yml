name: SonarQube Analysis

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build and Analyze Airline Service
        working-directory: ./Airline-Service
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify -DskipTests sonar:sonar \
            -Dsonar.organization=ssharma3108-1 \
            -Dsonar.projectKey=ssharma3108-1_airline_service \
            -Dsonar.projectName="Airline Service"