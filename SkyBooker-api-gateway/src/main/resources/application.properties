spring.application.name=SkyBooker-api-gateway

server.port=8080


# JWT Secret 
jwt.secret=mysecretkeymysecretkeymysecretkey123

# ================= ROUTES =================

# Auth Service
spring.cloud.gateway.routes[0].id=auth
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# Booking Service
spring.cloud.gateway.routes[1].id=booking
spring.cloud.gateway.routes[1].uri=http://localhost:8084
spring.cloud.gateway.routes[1].predicates[0]=Path=/bookings/**

# Flight Service
spring.cloud.gateway.routes[2].id=flight
spring.cloud.gateway.routes[2].uri=http://localhost:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/flights/**

# Seat Service
spring.cloud.gateway.routes[3].id=seat
spring.cloud.gateway.routes[3].uri=http://localhost:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/seats/**

# Passenger Service
spring.cloud.gateway.routes[4].id=passenger
spring.cloud.gateway.routes[4].uri=http://localhost:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/passengers/**

# Payment Service
spring.cloud.gateway.routes[5].id=payment
spring.cloud.gateway.routes[5].uri=http://localhost:8086
spring.cloud.gateway.routes[5].predicates[0]=Path=/payments/**

# Notification Service
spring.cloud.gateway.routes[6].id=notification
spring.cloud.gateway.routes[6].uri=http://localhost:8087
spring.cloud.gateway.routes[6].predicates[0]=Path=/notifications/**

# Airline & Airport Service
spring.cloud.gateway.routes[7].id=airline-airport
spring.cloud.gateway.routes[7].uri=http://localhost:8088
spring.cloud.gateway.routes[7].predicates[0]=Path=/airports/**,/airlines/**

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true